# Automatisches Deployment zu IONOS bei jedem Push auf main.
# Voraussetzung: drei Repository-Secrets (Settings > Secrets and variables > Actions):
#   IONOS_HOST      – SFTP-Hostname aus dem IONOS Control-Center (access-XXXXXXXXX.webspace-host.com)
#   IONOS_USER      – SFTP-Benutzername (z.B. a1234567)
#   IONOS_PASSWORD  – zugehöriges Passwort
# Hinweis: Dieser IONOS-Vertrag unterstützt nur SFTP (Port 22), kein FTPS.
# Deshalb erfolgt der Upload per lftp mirror über SFTP.
name: Deploy zu IONOS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: lftp installieren
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Per SFTP zu IONOS hochladen
        env:
          IONOS_HOST: ${{ secrets.IONOS_HOST }}
          IONOS_USER: ${{ secrets.IONOS_USER }}
          IONOS_PASSWORD: ${{ secrets.IONOS_PASSWORD }}
        run: |
          cat > /tmp/deploy.lftp <<'EOF'
          set sftp:auto-confirm yes
          set net:max-retries 2
          set net:timeout 30
          mirror -R --verbose --no-perms --exclude ^\.git/ --exclude ^\.github/ --exclude ^README\.md$ --exclude ^\.gitignore$ --exclude ^\.nojekyll$ --exclude ^\.ftp-deploy-sync-state\.json$ ./ ./
          quit
          EOF
          lftp -u "$IONOS_USER","$IONOS_PASSWORD" "sftp://$IONOS_HOST" -e "source /tmp/deploy.lftp"
